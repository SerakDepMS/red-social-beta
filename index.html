<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serakdep MS · Iniciar Sesión</title>
<meta name="description" content="Accede a Serakdep MS, la red social exclusiva de tu comunidad. Inicia sesión o crea tu cuenta.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ═══ DESIGN TOKENS (mirrors style.css) ═══ */
  :root {
    --green:   #2d6a4f; --green-h: #1b4332; --green-m: #40916c;
    --green-l: rgba(45,106,79,.10); --green-l2: rgba(45,106,79,.18);
    --accent:  #74c69d;
    --bg:      #eef7f2; --card: #ffffff; --card2: #f4faf7;
    --text:    #0f1a12; --text2: #6b7280;
    --border:  #c8e6c9;
    --danger:  #ef4444; --danger-l: rgba(239,68,68,.10);
    --sh1: 0 1px 4px rgba(0,0,0,.06);
    --sh2: 0 6px 24px rgba(0,0,0,.09);
    --sh3: 0 20px 60px rgba(0,0,0,.14);
    --font-head: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --r-sm:8px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-2xl:36px; --r-pill:100px;
  }
  body.dark {
    --bg:#071209; --card:rgba(14,24,16,.97); --card2:rgba(18,30,20,.95);
    --text:#dff2ea; --text2:#6a8c76; --border:rgba(45,106,79,.22);
    --green-l:rgba(45,106,79,.14); --green-l2:rgba(45,106,79,.22);
    --sh2:0 6px 24px rgba(0,0,0,.5); --sh3:0 20px 60px rgba(0,0,0,.65);
  }
  body.theme-blue   { --green:#3b82f6;--green-h:#2563eb;--green-m:#60a5fa;--green-l:rgba(59,130,246,.10);--green-l2:rgba(59,130,246,.18);--accent:#93c5fd; }
  body.theme-purple { --green:#7c3aed;--green-h:#6d28d9;--green-m:#a78bfa;--green-l:rgba(124,58,237,.10);--green-l2:rgba(124,58,237,.18);--accent:#c4b5fd; }
  body.theme-pink   { --green:#ec4899;--green-h:#db2777;--green-m:#f472b6;--green-l:rgba(236,72,153,.10);--green-l2:rgba(236,72,153,.18);--accent:#fbcfe8; }
  body.theme-orange { --green:#f59e0b;--green-h:#d97706;--green-m:#fbbf24;--green-l:rgba(245,158,11,.10);--green-l2:rgba(245,158,11,.18);--accent:#fde68a; }
  body.theme-cyan   { --green:#06b6d4;--green-h:#0891b2;--green-m:#22d3ee;--green-l:rgba(6,182,212,.10);--green-l2:rgba(6,182,212,.18);--accent:#a5f3fc; }
  body.theme-yellow { --green:#eab308;--green-h:#ca8a04;--green-m:#facc15;--green-l:rgba(234,179,8,.10);--green-l2:rgba(234,179,8,.18);--accent:#fef08a; }
  body.theme-red    { --green:#dc2626;--green-h:#b91c1c;--green-m:#f87171;--green-l:rgba(220,38,38,.10);--green-l2:rgba(220,38,38,.18);--accent:#fca5a5; }
  body.theme-teal   { --green:#0d9488;--green-h:#0f766e;--green-m:#2dd4bf;--green-l:rgba(13,148,136,.10);--green-l2:rgba(13,148,136,.18);--accent:#99f6e4; }
  body.theme-amber  { --green:#d97706;--green-h:#b45309;--green-m:#f59e0b;--green-l:rgba(217,119,6,.10);--green-l2:rgba(217,119,6,.18);--accent:#fcd34d; }

  html { font-size: 15px; -webkit-font-smoothing: antialiased; }
  body {
    font-family: var(--font-body);
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
    transition: background .35s, color .25s;
  }

  /* ═══ BACKGROUND ═══ */
  .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bg-blob {
    position: absolute; border-radius: 50%; filter: blur(96px);
    will-change: transform;
    animation: blobDrift var(--dur,18s) ease-in-out infinite var(--delay,0s);
    opacity: var(--op,.26);
  }
  .bb1 { width:580px;height:580px;background:var(--green-m);top:-200px;left:-140px;--dur:22s;--delay:0s; }
  .bb2 { width:420px;height:420px;background:var(--accent);  bottom:-100px;right:-90px; --dur:26s;--delay:-8s;--op:.16; }
  .bb3 { width:300px;height:300px;background:var(--green);   top:42%;left:36%;         --dur:18s;--delay:-14s;--op:.12; }
  @keyframes blobDrift {
    0%,100%{ transform:translate(0,0) scale(1); }
    33%    { transform:translate(45px,-35px) scale(1.07); }
    66%    { transform:translate(-30px,40px) scale(0.95); }
  }
  #particle-canvas { position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55; }

  /* ═══ LAYOUT ═══ */
  .auth-split {
    position: relative; z-index: 1;
    display: flex; width: 100%; min-height: 100vh;
  }

  /* ═══ LEFT PANEL ═══ */
  .auth-left {
    flex: 1.2;
    display: flex; flex-direction: column;
    justify-content: space-between; align-items: flex-start;
    padding: 64px;
    position: relative; overflow: hidden;
    background: transparent;
    border-right: 1px solid var(--border);
  }
  .auth-left-inner {
    max-width: 470px; width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: space-between;
    position: relative; z-index: 10;
  }

  /* Brand */
  .brand-row {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 28px;
    animation: slideUp .6s cubic-bezier(.22,1,.36,1) both;
  }
  .brand-mark {
    width: 50px; height: 50px; border-radius: 16px;
    background: linear-gradient(135deg, var(--green-h), var(--green-m));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; color: #fff;
    box-shadow: 0 6px 20px rgba(0,255,136,0.12); flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .brand-mark::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,.22) 0%, transparent 55%);
  }
  .auth-left .brand-name {
    font-family: var(--font-head); font-size: 1.9rem; font-weight: 900;
    color: var(--text); letter-spacing: -.04em; line-height: 1;
  }
  .auth-left .brand-name span { color: var(--green); }
  .auth-left .brand-sub { font-size: .8rem; font-weight: 500; color: var(--text2); margin-top: 3px; }

  /* Stat chips — glass effect so 3D scene shows through */
  .auth-left .stat-chip {
    background: var(--card) !important;
    border-color: var(--border) !important;
    color: var(--text) !important;
    backdrop-filter: blur(6px);
  }
  .auth-left .stat-chip .sn { color: var(--green) !important; }
  .auth-left .stat-chip .sl { color: var(--text2) !important; }

  /* ─── Immersive 3D Space Background ─── */
  #galaxy-canvas {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }




  /* Stats bar */
  .stats-bar {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 10px;
    animation: slideUp .8s cubic-bezier(.22,1,.36,1) .12s both;
  }
  .stat-chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 12px 8px;
    text-align: center;
    transition: transform .2s, box-shadow .2s;
    cursor: default;
  }
  .stat-chip:hover { transform: translateY(-2px); box-shadow: var(--sh2); }
  .stat-chip .sn {
    display: block; font-family: var(--font-head);
    font-size: 1.15rem; font-weight: 900; color: var(--green);
  }
  .stat-chip .sl {
    font-size: .66rem; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .07em; margin-top: 2px;
  }

  /* ═══ SEPARATOR ═══ */
  .auth-right {
    flex: 0 0 460px;
    display: flex; align-items: center; justify-content: center;
    padding: 44px 38px; position: relative;
  }
  .auth-right::before {
    content:''; position:absolute; left:0; top:8%; bottom:8%;
    width:1px;
    background: linear-gradient(to bottom, transparent, var(--border), transparent);
  }

  /* ═══ FORM CARD ═══ */
  .auth-card {
    width: 100%; max-width: 385px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r-2xl); padding: 36px 32px;
    box-shadow: var(--sh3);
    animation: cardIn .75s cubic-bezier(.22,1,.36,1) both;
    position: relative; overflow: hidden;
    backdrop-filter: blur(10px);
  }
  .auth-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background: linear-gradient(90deg, var(--green-h), var(--green-m), var(--accent));
    border-radius: var(--r-2xl) var(--r-2xl) 0 0;
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(28px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes slideUp {
    from { opacity:0; transform:translateY(22px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Form header */
  .form-header { text-align:center; margin-bottom:26px; }
  .form-logo {
    width:50px; height:50px; margin:0 auto 14px;
    border-radius:16px;
    background: linear-gradient(135deg, var(--green-h), var(--green-m));
    display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; color:#fff;
    box-shadow: 0 4px 16px var(--green-l2);
    position:relative; overflow:hidden;
    animation: spinLogo 8s linear infinite;
  }
  .form-logo::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg, rgba(255,255,255,.22) 0%, transparent 55%);
  }
  @keyframes spinLogo {
    0%,90%,100% { transform:rotate(0deg); }
    95% { transform:rotate(15deg); }
    97% { transform:rotate(-8deg); }
  }
  .form-header h1 {
    font-family: var(--font-head); font-size: 1.45rem; font-weight: 800;
    color: var(--text); letter-spacing: -.025em; margin-bottom: 5px;
  }
  .form-header p { font-size:.82rem; color: var(--text2); }

  /* Tabs */
  .auth-tabs {
    display:flex;
    background: var(--card2); border: 1.5px solid var(--border);
    border-radius: var(--r-pill); padding:4px; gap:3px;
    margin-bottom:24px; position:relative;
  }
  .auth-tab-indicator {
    position:absolute; top:4px; bottom:4px; left:4px;
    width:calc(50% - 4px);
    background: var(--green);
    border-radius: var(--r-pill);
    box-shadow: 0 3px 12px var(--green-l2);
    transition: transform .38s cubic-bezier(.34,1.56,.64,1);
    pointer-events:none; z-index:1;
  }
  .auth-tabs.on-register .auth-tab-indicator { transform:translateX(100%); }
  .auth-tab {
    flex:1; padding:9px 12px; border-radius:var(--r-pill);
    border:none; background:none; cursor:pointer;
    font-family:var(--font-head); font-weight:700; font-size:.82rem;
    color:var(--text2); transition:color .22s; position:relative; z-index:2;
  }
  .auth-tab.active { color:#fff; }

  /* Error */
  .auth-err {
    display:none; background:var(--danger-l);
    border:1px solid rgba(239,68,68,.25); border-left:3px solid var(--danger);
    color:var(--danger); padding:10px 13px; border-radius:var(--r-md);
    font-size:.8rem; font-weight:600; margin-bottom:16px;
    animation: errShake .4s ease;
  }
  @keyframes errShake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}   60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }

  /* Fields */
  .auth-field { margin-bottom:16px; }
  .auth-field label {
    display:block; margin-bottom:6px;
    font-family:var(--font-head); font-size:.78rem; font-weight:700;
    color:var(--text2); letter-spacing:.01em;
    transition:color .2s;
  }
  .auth-field:focus-within label { color:var(--green); }
  .field-wrap { position:relative; }
  .field-icon {
    position:absolute; left:13px; top:50%;
    transform:translateY(-50%);
    color:var(--text2); font-size:.82rem;
    pointer-events:none; transition:color .2s;
  }
  .field-wrap:focus-within .field-icon { color:var(--green); }
  .field-wrap input {
    width:100%; padding:11px 40px 11px 38px;
    background:var(--card2); border:1.5px solid var(--border);
    border-radius:var(--r-md);
    font-family:var(--font-body); font-size:.9rem; color:var(--text);
    outline:none; transition:border-color .2s, background .2s, box-shadow .2s;
    -webkit-appearance:none;
  }
  .field-wrap input::placeholder { color:var(--text2); opacity:.5; }
  .field-wrap input:focus {
    border-color:var(--green); background:var(--card);
    box-shadow:0 0 0 3px var(--green-l);
  }
  .field-wrap input:-webkit-autofill {
    -webkit-box-shadow:0 0 0 40px var(--card2) inset !important;
    -webkit-text-fill-color:var(--text) !important;
    border-color:var(--green) !important;
  }
  .field-icon-after {
    position:absolute; right:11px; top:50%; transform:translateY(-50%);
    background:none; border:none; cursor:pointer;
    color:var(--text2); font-size:.8rem; padding:4px;
    border-radius:6px; transition:color .15s;
    display:flex; align-items:center; justify-content:center;
  }
  .field-icon-after:hover { color:var(--green); }

  /* 2FA */
  #fa2-login-wrap { display:none; overflow:hidden; animation:dropIn .3s ease; }
  @keyframes dropIn {
    from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)}
  }

  /* Submit button */
  .btn-submit {
    width:100%; padding:13px;
    background:linear-gradient(135deg,var(--green-h) 0%,var(--green) 50%,var(--green-m) 100%);
    background-size:200% 200%; animation:btnShimmer 3.5s ease infinite;
    color:#fff; font-family:var(--font-head); font-size:.94rem; font-weight:800;
    border:none; border-radius:var(--r-md);
    cursor:pointer; letter-spacing:.01em;
    display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow:0 4px 20px var(--green-l2);
    transition:transform .18s, box-shadow .18s;
    position:relative; overflow:hidden; margin-top:6px;
  }
  .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 28px var(--green-l2); }
  .btn-submit:active { transform:translateY(0); }
  .btn-submit::after {
    content:''; position:absolute; inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,.16) 0%,transparent 50%);
    pointer-events:none;
  }
  @keyframes btnShimmer {
    0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
  }
  .btn-submit .spinner {
    width:16px; height:16px; border:2px solid rgba(255,255,255,.35);
    border-top-color:#fff; border-radius:50%;
    animation:spin .7s linear infinite; display:none;
  }
  .btn-submit.loading .spinner { display:block; }
  .btn-submit.loading .btn-text { display:none; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Demo */
  .demo-badge {
    margin-top:16px; padding:10px 14px;
    background:var(--card2); border:1px dashed var(--border);
    border-radius:var(--r-md);
    font-size:.76rem; color:var(--text2); line-height:1.6; text-align:center;
  }
  .demo-badge strong { color:var(--green); font-weight:700; font-family:var(--font-head); }

  /* Panels */
  .auth-panel { display:none; animation:dropIn .3s ease; }
  .auth-panel.active { display:block; }
  .terms-txt { text-align:center; font-size:.73rem; color:var(--text2); margin-top:14px; line-height:1.55; }

  /* ═══ RESPONSIVE ═══ */
  @media (max-width:960px) {
    .auth-left { display:none; }
    .auth-right { flex:1; padding:36px 22px; }
    .auth-right::before { display:none; }
    .auth-card { max-width:440px; }
  }
  @media (max-width:480px) {
    .auth-right { padding:20px 14px; padding-top:42px; }
    .auth-card { padding:26px 18px; border-radius:var(--r-xl); }
  }
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
</style>
</head>
<body>
<script>
  (function(){
    const t = localStorage.getItem('sms_theme');
    const c = localStorage.getItem('sms_color');
    if(t === 'dark') document.body.classList.add('dark');
    if(c && c !== 'green') document.body.classList.add('theme-' + c);
  })();
</script>

<!-- Background -->
<div class="bg-layer" aria-hidden="true">
  <div class="bg-blob bb1"></div>
  <div class="bg-blob bb2"></div>
  <div class="bg-blob bb3"></div>
</div>
<canvas id="galaxy-canvas" aria-hidden="true"></canvas>

<div class="auth-split">

  <!-- ══ LEFT — Brand + 3D Character ══ -->
  <div class="auth-left">
    <div class="auth-left-inner">

      <!-- Brand -->
      <div class="brand-row">
        <div class="brand-mark"><i class="fas fa-leaf"></i></div>
        <div>
          <div class="brand-name">Serakdep <span>MS</span></div>
          <div class="brand-sub">Red Social de Comunidad</div>
        </div>
      </div>



      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-chip"><span class="sn">∞</span><span class="sl">Posts</span></div>
        <div class="stat-chip"><span class="sn">🔒</span><span class="sl">Privado</span></div>
        <div class="stat-chip"><span class="sn">2FA</span><span class="sl">Seguro</span></div>
        <div class="stat-chip"><span class="sn">🌿</span><span class="sl">Clan</span></div>
      </div>

    </div>
  </div>

  <!-- ══ RIGHT — Form ══ -->
  <div class="auth-right">
    <div class="auth-card">

      <div class="form-header">
        <div class="form-logo"><i class="fas fa-leaf"></i></div>
        <h1 id="form-title">Bienvenido de nuevo</h1>
        <p id="form-subtitle">Accede a tu cuenta de Serakdep MS</p>
      </div>

      <div class="auth-tabs" id="auth-tabs-ctrl">
        <div class="auth-tab-indicator"></div>
        <button class="auth-tab active" id="atab-login"    onclick="authTab('login')">Iniciar sesión</button>
        <button class="auth-tab"        id="atab-register" onclick="authTab('register')">Crear cuenta</button>
      </div>

      <div id="auth-err" class="auth-err"></div>

      <!-- LOGIN -->
      <div id="login-p" class="auth-panel active">
        <div class="auth-field">
          <label for="l-u">Usuario</label>
          <div class="field-wrap">
            <i class="fas fa-user field-icon"></i>
            <input type="text" id="l-u" placeholder="Tu nombre de usuario"
              autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
          </div>
        </div>
        <div class="auth-field">
          <label for="l-p">Contraseña</label>
          <div class="field-wrap">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="l-p" placeholder="••••••••"
              autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
            <button type="button" class="field-icon-after" onclick="togglePwd('l-p',this)" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div id="fa2-login-wrap" class="auth-field">
          <label for="l-2fa">Código 2FA (6 dígitos)</label>
          <div class="field-wrap">
            <i class="fas fa-shield-halved field-icon"></i>
            <input type="text" id="l-2fa" maxlength="6" placeholder="000000"
              style="letter-spacing:6px;text-align:center;font-size:1.05rem;font-weight:700;"
              onkeydown="if(event.key==='Enter')doLogin()">
          </div>
        </div>
        <button class="btn-submit" id="login-btn" onclick="handleLoginClick()">
          <span class="btn-text"><i class="fas fa-arrow-right-to-bracket"></i>&nbsp;Entrar</span>
          <span class="spinner"></span>
        </button>
        <div class="demo-badge">
          Demo: <strong>AdminSerak</strong> · contraseña: <strong>admin123</strong>
        </div>
      </div>

      <!-- REGISTER -->
      <div id="reg-p" class="auth-panel">
        <div class="auth-field">
          <label for="r-u">Nombre de usuario</label>
          <div class="field-wrap">
            <i class="fas fa-at field-icon"></i>
            <input type="text" id="r-u" placeholder="Elige un nombre único"
              autocomplete="username" onkeydown="if(event.key==='Enter')doRegister()">
          </div>
        </div>
        <div class="auth-field">
          <label for="r-p">Contraseña <span style="color:var(--text2);font-weight:400;">(mín. 4 caracteres)</span></label>
          <div class="field-wrap">
            <i class="fas fa-lock field-icon"></i>
            <input type="password" id="r-p" placeholder="Crea una contraseña segura"
              autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
            <button type="button" class="field-icon-after" onclick="togglePwd('r-p',this)" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button class="btn-submit" id="register-btn" onclick="handleRegisterClick()">
          <span class="btn-text"><i class="fas fa-user-plus"></i>&nbsp;Crear cuenta</span>
          <span class="spinner"></span>
        </button>
        <p class="terms-txt">Al registrarte aceptas participar como miembro activo de la comunidad Serakdep MS.</p>
      </div>

    </div>
  </div>
</div>

<script src="script.js" defer></script>

<!-- ═══ AUTH HELPERS ═══ -->
<script>
function authTab(t) {
  const tabs = document.getElementById('auth-tabs-ctrl');
  document.getElementById('atab-login').classList.toggle('active', t==='login');
  document.getElementById('atab-register').classList.toggle('active', t==='register');
  document.getElementById('login-p').classList.toggle('active', t==='login');
  document.getElementById('reg-p').classList.toggle('active', t==='register');
  tabs.classList.toggle('on-register', t==='register');
  document.getElementById('auth-err').style.display = 'none';
  document.getElementById('form-title').textContent    = t==='login' ? 'Bienvenido de nuevo' : 'Únete al clan';
  document.getElementById('form-subtitle').textContent = t==='login' ? 'Accede a tu cuenta de Serakdep MS' : 'Crea tu cuenta en Serakdep MS';
  if (window._charSet) window._charSet(t==='login' ? 'curious' : 'wave');
}

function authErr(msg) {
  const e = document.getElementById('auth-err');
  e.textContent = msg; e.style.display = 'block';
  e.style.animation = 'none'; e.offsetHeight; e.style.animation = '';
  if (window._charSet) window._charSet('error');
}

function togglePwd(id, btn) {
  const inp = document.getElementById(id), icon = btn.querySelector('i');
  inp.type = inp.type==='password' ? 'text' : 'password';
  icon.className = inp.type==='password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}

function setLoading(id, v) {
  const b = document.getElementById(id); if(b) b.classList.toggle('loading', v);
}

function handleLoginClick() {
  if (typeof doLogin!=='function') { authErr('Cargando… espera un momento.'); return; }
  if (window._charSet) window._charSet('excited');
  setLoading('login-btn', true);
  setTimeout(()=>{ doLogin(); setLoading('login-btn',false); }, 350);
}

function handleRegisterClick() {
  if (typeof doRegister!=='function') { authErr('Cargando… espera un momento.'); return; }
  if (window._charSet) window._charSet('excited');
  setLoading('register-btn', true);
  setTimeout(()=>{ doRegister(); setLoading('register-btn',false); }, 350);
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     THREE.JS 3D IMMERSIVE SPACE — ULTRA EDITION
═══════════════════════════════════════════════════════════ -->
<script>
(function(){
  if(!window.THREE) return;

  const T = THREE;
  const canvas = document.getElementById('galaxy-canvas');
  let W = window.innerWidth, H = window.innerHeight;

  /* ─ Renderer ─ */
  const renderer = new T.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  renderer.physicallyCorrectLights = true;
  renderer.toneMapping = T.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  /* ─ Scene & Camera ─ */
  const scene = new T.Scene();
  const camera = new T.PerspectiveCamera(45, W / H, 0.1, 200);
  camera.position.set(0, 0.5, 7.0);
  camera.lookAt(0, 0.0, 0);

  /* ─ Lighting ─ */
  scene.add(new T.AmbientLight(0x0a0a1a, 2.0));
  const sunLight = new T.PointLight(0xfff5cc, 3.5, 40);
  sunLight.position.set(5, 3, 4);
  scene.add(sunLight);
  const rimLight = new T.PointLight(0x4488ff, 1.8, 30);
  rimLight.position.set(-6, -2, -3);
  scene.add(rimLight);
  const lavLight = new T.PointLight(0xff4400, 2.2, 20);
  lavLight.position.set(0, -1, 2);
  scene.add(lavLight);

  /* ─ Root Groups ─ */
  const spaceGroup = new T.Group();
  scene.add(spaceGroup);
  const blackHoleGroup = new T.Group();
  spaceGroup.add(blackHoleGroup);

  function positionBlackHole() {
    if (W > 960) blackHoleGroup.position.set(-1.4, 0.05, 0);
    else         blackHoleGroup.position.set(0, 0.5, -1.0);
  }
  positionBlackHole();

  /* ════════════════════════════════════════════════
     BLACK HOLE — Double-ring Gravitational Lens
  ════════════════════════════════════════════════ */

  // Event horizon (absolute black)
  const horizonGeo = new T.SphereGeometry(0.28, 48, 48);
  const horizonMat = new T.MeshBasicMaterial({ color: 0x000000 });
  const horizon = new T.Mesh(horizonGeo, horizonMat);
  blackHoleGroup.add(horizon);

  // Photon ring — inner hot white ring
  const photonRingGeo = new T.TorusGeometry(0.30, 0.018, 12, 96);
  photonRingGeo.rotateX(Math.PI / 2);
  const photonRingMat = new T.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 1.0,
    blending: T.AdditiveBlending, depthWrite: false
  });
  const photonRing = new T.Mesh(photonRingGeo, photonRingMat);
  blackHoleGroup.add(photonRing);

  // Inner lensing glow shell (slightly tilted)
  const lensGeo = new T.TorusGeometry(0.34, 0.028, 8, 64);
  lensGeo.rotateX(Math.PI / 2.1);
  const lensMat = new T.MeshBasicMaterial({
    color: 0xffaa44, transparent: true, opacity: 0.85,
    blending: T.AdditiveBlending, depthWrite: false
  });
  const lensRing = new T.Mesh(lensGeo, lensMat);
  blackHoleGroup.add(lensRing);

  // Outer accretion disk — 3-arm particle spiral
  const diskCount = 6000;
  const diskGeo = new T.BufferGeometry();
  const diskPos = new Float32Array(diskCount * 3);
  const diskCol = new Float32Array(diskCount * 3);
  const diskData = [];

  for (let i = 0; i < diskCount; i++) {
    const arm = i % 3;
    const armOffset = (arm * 2 * Math.PI) / 3;
    const dist = 0.32 + Math.random() * 3.2;
    const ang = dist * 2.6 + armOffset + (Math.random() - 0.5) * 0.18;
    const ySpread = (Math.random() - 0.5) * 0.07 * (3.2 - dist);
    diskData.push({ dist, ang, ySpread, speed: 0.6 + Math.random() * 0.5, arm });
    diskPos[i*3]   = Math.cos(ang) * dist;
    diskPos[i*3+1] = ySpread;
    diskPos[i*3+2] = Math.sin(ang) * dist;
  }

  diskGeo.setAttribute('position', new T.BufferAttribute(diskPos, 3));
  diskGeo.setAttribute('color',    new T.BufferAttribute(diskCol, 3));

  const diskMat = new T.PointsMaterial({
    size: 0.055, vertexColors: true,
    transparent: true, opacity: 1.0,
    blending: T.AdditiveBlending, depthWrite: false
  });
  const diskPoints = new T.Points(diskGeo, diskMat);
  blackHoleGroup.add(diskPoints);

  /* ════════════════════════════════════════════════
     STARFIELD — dense, multi-color (blue/white/gold)
  ════════════════════════════════════════════════ */
  const STAR_COUNT = 2200;
  const starGeo = new T.BufferGeometry();
  const starPos = new Float32Array(STAR_COUNT * 3);
  const starCol = new Float32Array(STAR_COUNT * 3);
  const starData = [];

  for (let i = 0; i < STAR_COUNT; i++) {
    const x = (Math.random() - 0.5) * 22;
    const y = (Math.random() - 0.5) * 16;
    const z = -18 + Math.random() * 24;
    starData.push({ x, y, z, speed: 0.3 + Math.random() * 0.6 });
    starPos[i*3] = x; starPos[i*3+1] = y; starPos[i*3+2] = z;

    // Star type: blue dwarf / white / golden / red giant
    const type = Math.random();
    const br = 0.5 + Math.random() * 0.5;
    if (type < 0.25)      { starCol[i*3]=br*0.7; starCol[i*3+1]=br*0.82; starCol[i*3+2]=br; }       // blue
    else if (type < 0.55) { starCol[i*3]=br;     starCol[i*3+1]=br;      starCol[i*3+2]=br; }        // white
    else if (type < 0.75) { starCol[i*3]=br;     starCol[i*3+1]=br*0.88; starCol[i*3+2]=br*0.5; }   // golden
    else                  { starCol[i*3]=br;     starCol[i*3+1]=br*0.3;  starCol[i*3+2]=br*0.18; }  // red
  }

  starGeo.setAttribute('position', new T.BufferAttribute(starPos, 3));
  starGeo.setAttribute('color',    new T.BufferAttribute(starCol, 3));
  const starMat = new T.PointsMaterial({
    size: 0.038, vertexColors: true, transparent: true, opacity: 1.0, depthWrite: false,
    blending: T.AdditiveBlending
  });
  const starField = new T.Points(starGeo, starMat);
  spaceGroup.add(starField);

  /* ════════════════════════════════════════════════
     NEBULA CLOUDS — layered additive-blended dust
  ════════════════════════════════════════════════ */
  // Create multiple nebula layers with different colors
  function makeNebula(count, sizeMin, sizeMax, colorA, colorB, spread) {
    const geo = new T.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const col = new Float32Array(count * 3);
    for (let i = 0; i < count; i++) {
      pos[i*3]   = (Math.random()-0.5)*spread.x;
      pos[i*3+1] = (Math.random()-0.5)*spread.y;
      pos[i*3+2] = -12 + Math.random()*16;
      const t = Math.random();
      col[i*3]   = colorA[0]*(1-t) + colorB[0]*t;
      col[i*3+1] = colorA[1]*(1-t) + colorB[1]*t;
      col[i*3+2] = colorA[2]*(1-t) + colorB[2]*t;
    }
    geo.setAttribute('position', new T.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new T.BufferAttribute(col, 3));
    const mat = new T.PointsMaterial({
      size: sizeMin + Math.random()*(sizeMax-sizeMin),
      vertexColors: true, transparent: true, opacity: 0.22,
      blending: T.AdditiveBlending, depthWrite: false
    });
    return new T.Points(geo, mat);
  }

  const nebula1 = makeNebula(80, 2.5, 4.5, [0.05,0.0,0.18], [0.0,0.08,0.22], {x:14,y:10}); // deep violet/blue
  const nebula2 = makeNebula(60, 3.0, 5.5, [0.18,0.0,0.06], [0.22,0.05,0.0], {x:12,y:9});  // crimson/orange
  const nebula3 = makeNebula(50, 2.0, 3.5, [0.0,0.12,0.15], [0.0,0.18,0.08], {x:10,y:8});  // teal/emerald
  spaceGroup.add(nebula1, nebula2, nebula3);

  // Theme-colored nebula that syncs with UI
  const themeNebGeo = new T.BufferGeometry();
  const THEME_NEB_COUNT = 40;
  const themeNebPos = new Float32Array(THEME_NEB_COUNT * 3);
  const themeNebCol = new Float32Array(THEME_NEB_COUNT * 3);
  for (let i = 0; i < THEME_NEB_COUNT; i++) {
    themeNebPos[i*3]   = (Math.random()-0.5)*10;
    themeNebPos[i*3+1] = (Math.random()-0.5)*7;
    themeNebPos[i*3+2] = -8 + Math.random()*12;
  }
  themeNebGeo.setAttribute('position', new T.BufferAttribute(themeNebPos, 3));
  themeNebGeo.setAttribute('color',    new T.BufferAttribute(themeNebCol, 3));
  const themeNebMat = new T.PointsMaterial({
    size: 4.5, vertexColors: true, transparent: true, opacity: 0.22,
    blending: T.AdditiveBlending, depthWrite: false
  });
  const themeNebula = new T.Points(themeNebGeo, themeNebMat);
  spaceGroup.add(themeNebula);

  /* ════════════════════════════════════════════════
     PLANETS — Volcanic + Ice Giant with rings
  ════════════════════════════════════════════════ */
  const COLLISION_PT = new T.Vector3(1.2, 0.3, -2.0);
  const START1 = new T.Vector3().addVectors(COLLISION_PT, new T.Vector3(-5.5, 0.6, 0.4));
  const START2 = new T.Vector3().addVectors(COLLISION_PT, new T.Vector3(5.5, -0.6, -0.5));

  let planet1, planet2, planet1Wire, planet2Rings;
  let shockwave, debrisPoints, shockGlow;
  const DEBRIS_COUNT = 280;
  let debrisGeo, debrisData = [];
  let planetState = 'approaching', approachT = 0, explTimer = 0, speedMult = 1.0;
  let targetActivity = 1.0, currentActivity = 1.0;

  function createPlanets() {
    // ─ Planet 1: Volcanic / Lava ─
    const p1Geo = new T.SphereGeometry(0.42, 20, 20);
    const p1Mat = new T.MeshStandardMaterial({
      color: 0xcc2200, emissive: 0xff3300, emissiveIntensity: 1.4,
      roughness: 0.95, metalness: 0.05, flatShading: true
    });
    planet1 = new T.Mesh(p1Geo, p1Mat);
    planet1.position.copy(START1);
    spaceGroup.add(planet1);

    // Wireframe crust (lava crack lines)
    const p1WireGeo = new T.SphereGeometry(0.435, 10, 10);
    const p1WireMat = new T.MeshBasicMaterial({
      color: 0xff6600, wireframe: true, transparent: true, opacity: 0.35,
      blending: T.AdditiveBlending, depthWrite: false
    });
    planet1Wire = new T.Mesh(p1WireGeo, p1WireMat);
    planet1.add(planet1Wire);

    // Inner lava glow (point light attached to p1)
    const lavaGlow = new T.PointLight(0xff3300, 1.6, 3.5);
    planet1.add(lavaGlow);

    // ─ Planet 2: Ice / Gas Giant ─
    const p2Geo = new T.SphereGeometry(0.32, 24, 24);
    const p2Mat = new T.MeshStandardMaterial({
      color: 0x88ddff, emissive: 0x0044aa, emissiveIntensity: 0.8,
      roughness: 0.18, metalness: 0.85, flatShading: false
    });
    planet2 = new T.Mesh(p2Geo, p2Mat);
    planet2.position.copy(START2);
    spaceGroup.add(planet2);

    // Orbital rings (two rings, different tilt)
    planet2Rings = new T.Group();
    planet2.add(planet2Rings);

    function makeRing(innerR, outerR, color, opacity, tiltX, tiltZ) {
      const rGeo = new T.RingGeometry(innerR, outerR, 64);
      const rMat = new T.MeshBasicMaterial({
        color, side: T.DoubleSide, transparent: true, opacity,
        blending: T.AdditiveBlending, depthWrite: false
      });
      const ring = new T.Mesh(rGeo, rMat);
      ring.rotation.x = tiltX;
      ring.rotation.z = tiltZ;
      planet2Rings.add(ring);
    }
    makeRing(0.45, 0.72, 0x88ccff, 0.55, Math.PI/2.3, 0.25);
    makeRing(0.54, 0.64, 0xffffff, 0.25, Math.PI/2.1, -0.15);

    // ─ Shockwave ring ─
    const swGeo = new T.TorusGeometry(0.01, 0.022, 8, 64);
    swGeo.rotateX(Math.PI/2);
    const swMat = new T.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0,
      blending: T.AdditiveBlending, depthWrite: false
    });
    shockwave = new T.Mesh(swGeo, swMat);
    shockwave.position.copy(COLLISION_PT);
    spaceGroup.add(shockwave);

    // Shockwave secondary glow
    const sgGeo = new T.TorusGeometry(0.01, 0.06, 6, 40);
    sgGeo.rotateX(Math.PI/2);
    const sgMat = new T.MeshBasicMaterial({
      color: 0xff8800, transparent: true, opacity: 0,
      blending: T.AdditiveBlending, depthWrite: false
    });
    shockGlow = new T.Mesh(sgGeo, sgMat);
    shockGlow.position.copy(COLLISION_PT);
    spaceGroup.add(shockGlow);

    // ─ Debris / Explosion particles ─
    debrisGeo = new T.BufferGeometry();
    const dPos = new Float32Array(DEBRIS_COUNT * 3);
    const dCol = new Float32Array(DEBRIS_COUNT * 3);
    for (let i = 0; i < DEBRIS_COUNT; i++) {
      dPos[i*3] = COLLISION_PT.x;
      dPos[i*3+1] = COLLISION_PT.y;
      dPos[i*3+2] = COLLISION_PT.z;
      debrisData.push({ vx:0, vy:0, vz:0 });
    }
    debrisGeo.setAttribute('position', new T.BufferAttribute(dPos, 3));
    debrisGeo.setAttribute('color',    new T.BufferAttribute(dCol, 3));
    const dMat = new T.PointsMaterial({
      size: 0.065, vertexColors: true, transparent: true, opacity: 0,
      blending: T.AdditiveBlending, depthWrite: false
    });
    debrisPoints = new T.Points(debrisGeo, dMat);
    spaceGroup.add(debrisPoints);
  }
  createPlanets();

  /* ════════════════════════════════════════════════
     THEME COLOR SYNC
  ════════════════════════════════════════════════ */
  let lastThemeHex = '';
  function getThemeColor() {
    const col = new T.Color();
    const v = getComputedStyle(document.body).getPropertyValue('--green').trim();
    col.setStyle(v || '#2d6a4f');
    return col;
  }

  function syncTheme() {
    const tc = getThemeColor();
    const hex = tc.getHexString();
    if (hex === lastThemeHex) return;
    lastThemeHex = hex;

    // Accretion disk colors
    const da = diskGeo.attributes.color.array;
    for (let i = 0; i < diskCount; i++) {
      const p = diskData[i];
      const t = Math.max(0, Math.min(1, (p.dist - 0.32) / 3.2));
      const c = new T.Color();
      if (t < 0.18) {
        c.copy(tc).lerp(new T.Color(0xffffff), 1.0 - t/0.18);
      } else {
        c.copy(tc.clone().multiplyScalar(0.1)).lerp(tc, 1.0 - (t-0.18)/0.82);
      }
      da[i*3]=c.r; da[i*3+1]=c.g; da[i*3+2]=c.b;
    }
    diskGeo.attributes.color.needsUpdate = true;

    // Photon ring tint
    photonRingMat.color.copy(tc).lerp(new T.Color(0xffffff), 0.7);
    lensMat.color.copy(tc).lerp(new T.Color(0xff8800), 0.5);

    // Theme nebula
    const na = themeNebGeo.attributes.color.array;
    const dimTc = tc.clone().multiplyScalar(0.22);
    for (let i = 0; i < THEME_NEB_COUNT; i++) {
      na[i*3]=dimTc.r; na[i*3+1]=dimTc.g; na[i*3+2]=dimTc.b;
    }
    themeNebGeo.attributes.color.needsUpdate = true;

    if (shockwave) shockwave.material.color.copy(tc);
  }

  new MutationObserver(syncTheme).observe(document.body, { attributes:true, attributeFilter:['class'] });

  /* ════════════════════════════════════════════════
     COLLISION FSM
  ════════════════════════════════════════════════ */
  function triggerExplosion() {
    planetState = 'exploding';
    explTimer = 0;
    shockwave.scale.set(1,1,1);
    shockwave.material.opacity = 1.0;
    shockGlow.scale.set(1,1,1);
    shockGlow.material.opacity = 0.7;

    const dPos = debrisGeo.attributes.position.array;
    const dCol = debrisGeo.attributes.color.array;
    const tc = getThemeColor();

    for (let i = 0; i < DEBRIS_COUNT; i++) {
      dPos[i*3]   = COLLISION_PT.x;
      dPos[i*3+1] = COLLISION_PT.y;
      dPos[i*3+2] = COLLISION_PT.z;

      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(Math.random()*2 - 1);
      const spd = 1.5 + Math.random() * 3.8;
      debrisData[i].vx = Math.sin(phi)*Math.cos(theta)*spd;
      debrisData[i].vy = Math.sin(phi)*Math.sin(theta)*spd;
      debrisData[i].vz = Math.cos(phi)*spd;

      // Colors: hot core orange → theme color → ember red
      const t = Math.random();
      const c = new T.Color(0xff6600).lerp(t < 0.5 ? tc : new T.Color(0xff2200), t);
      dCol[i*3]=c.r; dCol[i*3+1]=c.g; dCol[i*3+2]=c.b;
    }
    debrisGeo.attributes.position.needsUpdate = true;
    debrisGeo.attributes.color.needsUpdate = true;
    debrisPoints.material.opacity = 1.0;
  }

  function resetPlanets() {
    planetState = 'approaching';
    approachT = 0;
    planet1.scale.set(1,1,1); planet1.position.copy(START1);
    planet2.scale.set(1,1,1); planet2.position.copy(START2);
    shockwave.material.opacity = 0;
    shockGlow.material.opacity = 0;
    debrisPoints.material.opacity = 0;
  }

  /* ════════════════════════════════════════════════
     ACTIVITY API (responds to form interactions)
  ════════════════════════════════════════════════ */
  window._charSet = function(state) {
    if      (state === 'excited')  { targetActivity = 4.0; speedMult = 2.5; }
    else if (state === 'curious' || state === 'password') { targetActivity = 2.0; speedMult = 1.5; }
    else if (state === 'error')   { targetActivity = 7.0; speedMult = 4.0; setTimeout(()=>{ targetActivity=1.0; speedMult=1.0; }, 2200); }
    else                           { targetActivity = 1.0; speedMult = 1.0; }
  };

  /* ════════════════════════════════════════════════
     ANIMATION LOOP
  ════════════════════════════════════════════════ */
  const clock = new T.Clock();
  syncTheme();

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    const et = clock.getElapsedTime();

    currentActivity = T.MathUtils.lerp(currentActivity, targetActivity, 0.07);
    syncTheme();

    // Slow scenic universe rotation
    spaceGroup.rotation.y += 0.006 * dt;

    // ── Starfield flythrough ──
    const sp = starGeo.attributes.position.array;
    for (let i = 0; i < STAR_COUNT; i++) {
      const s = starData[i];
      s.z += s.speed * 1.8 * currentActivity * dt;
      if (s.z > 6) { s.z = -18; s.x = (Math.random()-.5)*22; s.y = (Math.random()-.5)*16; }
      sp[i*3]=s.x; sp[i*3+1]=s.y; sp[i*3+2]=s.z;
    }
    starGeo.attributes.position.needsUpdate = true;

    // ── Accretion disk swirl ──
    const dp = diskGeo.attributes.position.array;
    for (let i = 0; i < diskCount; i++) {
      const p = diskData[i];
      const angSpd = (p.speed * 0.38 * currentActivity) / Math.max(0.15, p.dist);
      p.ang += angSpd * dt;
      const inflow = 0.06 * currentActivity * (1.25 - Math.min(1, p.dist * 0.38));
      p.dist -= inflow * dt;
      if (p.dist < 0.1) { p.dist = 2.8 + Math.random()*0.7; p.ang = (p.arm*2*Math.PI)/3 + (Math.random()-.5)*0.2; }
      dp[i*3]   = Math.cos(p.ang)*p.dist;
      dp[i*3+2] = Math.sin(p.ang)*p.dist;
    }
    diskGeo.attributes.position.needsUpdate = true;

    // ── Black hole pulse ──
    const pulse = 1 + Math.sin(et * 3.2 * currentActivity) * 0.035;
    horizon.scale.set(pulse, pulse, pulse);
    photonRing.rotation.z += 0.4 * dt;
    lensRing.rotation.z   -= 0.25 * dt;
    photonRingMat.opacity = 0.85 + Math.sin(et*4.5)*0.1;

    // ── Nebula drift ──
    nebula1.rotation.z += 0.008 * dt;
    nebula2.rotation.z -= 0.005 * dt;
    nebula3.rotation.y += 0.006 * dt;
    themeNebula.rotation.z += 0.004 * dt;

    // ── Planetary approach & collision ──
    if (planetState === 'approaching') {
      approachT += dt * 0.07 * speedMult;
      // Ease-in-out: slow at start, accelerate near collision
      const eased = approachT < 0.8 ? approachT : 0.8 + (approachT-0.8)*3.5;
      if (eased >= 1.0) {
        triggerExplosion();
      } else {
        planet1.position.lerpVectors(START1, COLLISION_PT, Math.min(eased, 1));
        planet2.position.lerpVectors(START2, COLLISION_PT, Math.min(eased, 1));
        planet1.rotation.y += 0.6 * dt;
        planet1.rotation.x += 0.15 * dt;
        planet2.rotation.y -= 0.8 * dt;
        planet2.rotation.x += 0.2 * dt;
        // Rings orbit
        if (planet2Rings) planet2Rings.rotation.y += 1.2 * dt;
        // Lava crack flicker
        if (planet1Wire) planet1Wire.material.opacity = 0.3 + Math.sin(et*12)*0.15;
      }
    } else if (planetState === 'exploding') {
      explTimer += dt * speedMult;

      // Expand shockwaves
      const swScale = 1 + explTimer * 18 * speedMult;
      shockwave.scale.set(swScale, swScale, swScale);
      shockGlow.scale.set(swScale*0.7, swScale*0.7, swScale*0.7);
      shockwave.material.opacity = Math.max(0, 1 - explTimer/1.8);
      shockGlow.material.opacity = Math.max(0, 0.6 - explTimer/1.4);

      // Planet fragment / shrink
      const frac = Math.max(0, 1 - explTimer/0.35);
      planet1.scale.set(frac, frac, frac);
      planet2.scale.set(frac, frac, frac);

      // Debris particle integration
      const dp2 = debrisGeo.attributes.position.array;
      for (let i = 0; i < DEBRIS_COUNT; i++) {
        const d = debrisData[i];
        dp2[i*3]   += d.vx * dt;
        dp2[i*3+1] += d.vy * dt;
        dp2[i*3+2] += d.vz * dt;
        const drag = 1 - 0.55 * dt;
        d.vx *= drag; d.vy *= drag; d.vz *= drag;
      }
      debrisGeo.attributes.position.needsUpdate = true;
      debrisPoints.material.opacity = Math.max(0, 1 - explTimer/4.5);

      if (explTimer >= 5.0) resetPlanets();
    }

    renderer.render(scene, camera);
  }
  animate();

  /* ── Form interaction bindings ── */
  setTimeout(() => {
    const bind = (id, s) => { const el = document.getElementById(id); if(el) el.addEventListener('focus', ()=>window._charSet(s)); };
    bind('l-u','curious'); bind('l-p','password'); bind('l-2fa','curious');
    bind('r-u','curious'); bind('r-p','password');

    document.querySelectorAll('.auth-field input').forEach(inp => {
      inp.addEventListener('blur', () => setTimeout(()=>{ if(!document.activeElement?.matches('input')) window._charSet('idle'); }, 200));
    });
    document.getElementById('login-btn')?.addEventListener('mouseenter', ()=>window._charSet('excited'));
    document.getElementById('register-btn')?.addEventListener('mouseenter', ()=>window._charSet('excited'));
    document.querySelectorAll('.btn-submit').forEach(b => b.addEventListener('mouseleave', ()=>window._charSet('idle')));
    document.querySelectorAll('.auth-tab').forEach(tab => {
      tab.addEventListener('click', ()=>window._charSet('excited'));
      tab.addEventListener('mouseenter', ()=>window._charSet('curious'));
      tab.addEventListener('mouseleave', ()=>window._charSet('idle'));
    });
  }, 800);

  window.addEventListener('resize', () => {
    W = window.innerWidth; H = window.innerHeight;
    renderer.setSize(W, H);
    camera.aspect = W/H;
    camera.updateProjectionMatrix();
    positionBlackHole();
  });
})();
</script>

</body>
</html>
